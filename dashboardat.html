<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Irrigation Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

color:white;

padding:25px;

min-height:100vh;

}

.container{

max-width:1400px;

margin:auto;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

}

header h1{

font-size:35px;

font-weight:700;

}

#serverStatus{

padding:12px 20px;

border-radius:30px;

font-weight:bold;

font-size:17px;

}

.online{

background:#16a34a;

}

.offline{

background:#dc2626;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border-radius:20px;

padding:20px;

box-shadow:0 10px 25px rgba(0,0,0,.35);

transition:.3s;

text-align:center;

}

.card:hover{

transform:translateY(-5px);

}

.card h2{

margin-bottom:18px;

font-size:22px;

}

.value{

font-size:42px;

font-weight:bold;

margin-top:15px;

}

.gaugeCard{

grid-column:span 2;

}

.gauge{

display:flex;

justify-content:center;

align-items:center;

}

#soilText{

font-weight:bold;

font-size:34px;

}

#progress{

transition:stroke-dashoffset 1s ease;

}

#pumpStatus{

font-size:34px;

font-weight:bold;

padding:18px;

border-radius:12px;

transition:.5s;

}

.pumpOn{

background:#22c55e;

animation:pulse 1s infinite;

}

.pumpOff{

background:#ef4444;

}

@keyframes pulse{

0%{

transform:scale(1);

}

50%{

transform:scale(1.05);

}

100%{

transform:scale(1);

}

}

.messageCard{

background:rgba(255,255,255,.08);

padding:25px;

border-radius:20px;

margin-bottom:25px;

backdrop-filter:blur(10px);

box-shadow:0 10px 25px rgba(0,0,0,.3);

}

.messageCard h2{

margin-bottom:15px;

}

.messageCard p{

font-size:20px;

line-height:1.6;

}

.chartCard{

background:rgba(255,255,255,.08);

padding:25px;

border-radius:20px;

margin-bottom:25px;

height:430px;

backdrop-filter:blur(10px);

}

canvas{

width:100%!important;

height:100%!important;

}

.logCard{

background:rgba(255,255,255,.08);

padding:20px;

border-radius:20px;

backdrop-filter:blur(10px);

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

}

th{

background:#10b981;

padding:15px;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid rgba(255,255,255,.15);

}

tr:hover{

background:rgba(255,255,255,.08);

}

@media(max-width:900px){

.gaugeCard{

grid-column:span 1;

}

header{

flex-direction:column;

gap:20px;

}

header h1{

font-size:28px;

text-align:center;

}

.value{

font-size:34px;

}

}

@media(max-width:600px){

.cards{

grid-template-columns:1fr;

}

table{

font-size:13px;

}

th,td{

padding:8px;

}

}

</style>

</head>

<body>

<div class="container">

<header>

<h1>🌱 Smart Irrigation Dashboard</h1>

<div id="serverStatus" class="offline">
🔴 Offline
</div>

</header>

<div class="cards">

<div class="card gaugeCard">

<h2>Soil Moisture</h2>

<div class="gauge">

<svg width="260" height="260">

<circle
cx="130"
cy="130"
r="90"
stroke="#2d4c5f"
stroke-width="18"
fill="none"/>

<circle
id="progress"
cx="130"
cy="130"
r="90"
stroke="#00ffd0"
stroke-width="18"
fill="none"
stroke-linecap="round"
stroke-dasharray="565"
stroke-dashoffset="565"
transform="rotate(-90 130 130)"
/>

<text
id="soilText"
x="130"
y="135"
text-anchor="middle"
font-size="34"
fill="white">0%</text>

</svg>

</div>

</div>

<div class="card">

<h2>Temperature</h2>

<div class="value">

🌡️

<span id="temp">

--

</span>

°C

</div>

</div>

<div class="card">

<h2>Humidity</h2>

<div class="value">

💧

<span id="humidity">

--

</span>

%

</div>

</div>

<div class="card">

<h2>Water Pump</h2>

<div id="pumpStatus" class="pumpOff">

OFF

</div>

</div>

<div class="card">

<h2>Duration</h2>

<div class="value">

<span id="duration">

0

</span>

sec

</div>

</div>

<div class="card">

<h2>Last Update</h2>

<div id="time">

--

</div>

</div>

</div>

<div class="messageCard">

<h2>Latest Prediction</h2>

<p id="message">

Waiting for server...

</p>

</div>

<div class="chartCard">

<canvas id="soilChart"></canvas>

</div>

<div class="logCard">

<h2>Prediction History</h2>

<table>

<thead>

<tr>

<th>Time</th>
<th>Soil</th>
<th>Temp</th>
<th>Humidity</th>
<th>Duration</th>
<th>Status</th>

</tr>

</thead>

<tbody id="logTable">

</tbody>

</table>

</div>

</div>

<script>

const SERVER_URL = "http://192.168.83.77:5000";

const soilText = document.getElementById("soilText");
const progress = document.getElementById("progress");

const temp = document.getElementById("temp");
const humidity = document.getElementById("humidity");
const duration = document.getElementById("duration");
const message = document.getElementById("message");
const pump = document.getElementById("pumpStatus");
const serverStatus = document.getElementById("serverStatus");
const updateTime = document.getElementById("time");
const table = document.getElementById("logTable");

let chart;
let chartLabels = [];
let chartValues = [];

function createChart(){

const ctx=document.getElementById("soilChart").getContext("2d");

chart=new Chart(ctx,{
type:"line",
data:{
labels:chartLabels,
datasets:[{
label:"Soil Moisture %",
data:chartValues,
borderWidth:3,
fill:false,
tension:0.3
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
labels:{
color:"white"
}
}
},
scales:{
x:{
ticks:{
color:"white"
},
grid:{
color:"rgba(255,255,255,.15)"
}
},
y:{
min:0,
max:100,
ticks:{
color:"white"
},
grid:{
color:"rgba(255,255,255,.15)"
}
}
}
}
});

}

createChart();

function updateGauge(value){

soilText.innerHTML=value.toFixed(1)+"%";

const circumference=565;

const offset=circumference-(value/100)*circumference;

progress.style.strokeDashoffset=offset;

if(value<35){

progress.setAttribute("stroke","#ef4444");

}
else if(value<65){

progress.setAttribute("stroke","#f59e0b");

}
else{

progress.setAttribute("stroke","#22c55e");

}

}

async function checkServer(){

try{

const res=await fetch(SERVER_URL+"/status");

if(res.ok){

serverStatus.innerHTML="🟢 Online";

serverStatus.className="online";

}
else{

throw "offline";

}

}catch{

serverStatus.innerHTML="🔴 Offline";

serverStatus.className="offline";

}

}

async function loadDashboard(){

try{

const response=await fetch(SERVER_URL+"/log");

const data=await response.json();

if(data.length===0) return;

const last=data[data.length-1];

updateGauge(last.soil_moisture);

temp.innerHTML=last.temperature;

humidity.innerHTML=last.humidity;

duration.innerHTML=last.duration_sec;

message.innerHTML=last.message;

updateTime.innerHTML=last.time;

if(last.message.includes("ON")){

pump.innerHTML="🟢 ON";

pump.className="pumpOn";

}
else{

pump.innerHTML="🔴 OFF";

pump.className="pumpOff";

}

chartLabels=data.slice(-20).map(x=>x.time);

chartValues=data.slice(-20).map(x=>x.soil_moisture);

chart.data.labels=chartLabels;

chart.data.datasets[0].data=chartValues;

chart.update();

table.innerHTML="";

data.slice().reverse().forEach(item=>{

table.innerHTML+=`
<tr>
<td>${item.time}</td>
<td>${item.soil_moisture.toFixed(1)}%</td>
<td>${item.temperature}°C</td>
<td>${item.humidity}%</td>
<td>${item.duration_sec} sec</td>
<td>${item.message}</td>
</tr>
`;

});

}catch(e){

console.log(e);

}

}

checkServer();

loadDashboard();

setInterval(checkServer,2000);

setInterval(loadDashboard,2000);

</script>

</body>

</html>
